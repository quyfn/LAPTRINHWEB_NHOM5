{% extends "spa/base.html" %}

{% block title %}Đã xóa đánh giá{% endblock %}

{% block content %}
<main class="reviews-page">
    <section class="reviews-panel">
        <div class="review-filter-row">
            <a href="/reviews/" class="review-filter active">Tất cả</a>
            <a href="/reviews/?tab=pending" class="review-filter">Chưa đánh giá</a>
            <a href="/reviews/?tab=done" class="review-filter">Đã đánh giá</a>
        </div>
        <div class="review-grid">
            {% for item in review_items %}
                <article class="review-card">
                    <div class="review-thumb {{ item.theme }}" style="background-image: url('{{ item.image }}');"></div>
                    <div class="review-status {{ item.status_class }}">{{ item.status }}</div>
                </article>
            {% endfor %}
        </div>
        <div class="mini-confirm success-box centered-box">
            <div class="success-check">✓</div>
            <strong>Bạn đã xoá đánh giá thành công!</strong>
        </div>
    </section>
</main>
{% endblock %}
