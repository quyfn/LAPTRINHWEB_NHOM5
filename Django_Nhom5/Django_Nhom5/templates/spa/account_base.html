{% extends "spa/base.html" %}

{% block content %}
<main class="account-shell">
    <div class="account-layout">
        <aside class="account-sidebar">
            <div class="sidebar-brand">
                <span class="brand-title">MAI TRÂM</span>
                <span class="brand-subtitle">Beauty & Spa</span>
            </div>
            <nav class="sidebar-nav">
                {% for item in account_links %}
                    <a href="{{ item.url }}" class="{% if account_active == item.key %}active{% endif %}">{{ item.label }}</a>
                {% endfor %}
            </nav>
            <a href="/account/" class="logout-link">Đăng xuất</a>
        </aside>
        <section class="account-main-panel">
            {% block account_content %}{% endblock %}
        </section>
    </div>
</main>
{% endblock %}
