{% extends "spa/account_base.html" %}

{% block title %}Điểm tích lũy{% endblock %}

{% block account_content %}
<section class="points-banner">
    <strong>{{ point_total }}</strong>
    <span>Điểm tích lũy hiện có</span>
</section>
<section class="account-table-card">
    <h2>Lịch sử tích điểm</h2>
    <table class="account-table">
        <thead>
            <tr>
                <th>Ngày</th>
                <th>Dịch vụ</th>
                <th>Điểm</th>
                <th>Số dư</th>
            </tr>
        </thead>
        <tbody>
            {% for row in point_rows %}
                <tr>
                    <td>{{ row.0 }}</td>
                    <td>{{ row.1 }}</td>
                    <td>{{ row.2 }}</td>
                    <td>{{ row.3 }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</section>
{% endblock %}
